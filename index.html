<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mighty Social Content Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F6F2; --surface: #FFFFFF; --border: #E4E2DC;
    --text: #1A1A18; --muted: #8A8880;
    --foxhue: #2563EB; --foxhue-light: #EFF6FF; --foxhue-mid: #BFDBFE;
    --pau: #7C3AED; --pau-light: #F5F3FF; --pau-mid: #DDD6FE;
    --approved: #059669; --approved-light: #ECFDF5;
    --pending: #D97706; --pending-light: #FFFBEB;
    --draft: #6B7280; --draft-light: #F9FAFB;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --radius: 10px; --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

  .header { background: var(--text); color: white; padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark { width: 32px; height: 32px; background: var(--foxhue); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
  .header-sub { font-size: 12px; opacity: 0.5; margin-top: 1px; font-family: 'DM Mono', monospace; }
  .legend { display: flex; gap: 16px; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; opacity: 0.8; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* Sync indicator */
  .sync-badge { display: flex; align-items: center; gap: 6px; font-size: 11px; font-family: 'DM Mono', monospace; padding: 4px 10px; border-radius: 20px; background: rgba(255,255,255,0.1); }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #6B7280; }
  .sync-dot.synced { background: #10B981; }
  .sync-dot.syncing { background: #F59E0B; animation: pulse 1s infinite; }
  .sync-dot.error { background: #EF4444; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .controls { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 32px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .controls-left { display: flex; align-items: center; gap: 8px; }
  .month-nav { display: flex; align-items: center; gap: 8px; }
  .month-btn { width: 32px; height: 32px; border: 1px solid var(--border); background: var(--surface); border-radius: var(--radius-sm); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--muted); transition: all 0.15s; }
  .month-btn:hover { border-color: var(--text); color: var(--text); }
  .month-label { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; min-width: 120px; text-align: center; }
  .view-tabs { display: flex; background: var(--bg); border-radius: var(--radius-sm); padding: 3px; gap: 2px; }
  .view-tab { padding: 6px 14px; border: none; background: transparent; border-radius: 5px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--muted); transition: all 0.15s; }
  .view-tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }
  .filter-bar { display: flex; align-items: center; gap: 8px; }
  .filter-chip { padding: 5px 12px; border: 1px solid var(--border); background: var(--surface); border-radius: 20px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--muted); transition: all 0.15s; }
  .filter-chip.active { background: var(--text); border-color: var(--text); color: white; }

  .stats-bar { padding: 16px 32px; display: flex; gap: 12px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 18px; display: flex; flex-direction: column; gap: 2px; min-width: 120px; }
  .stat-value { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .stat-label { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card.approved .stat-value { color: var(--approved); }
  .stat-card.pending .stat-value { color: var(--pending); }
  .stat-card.foxhue .stat-value { color: var(--foxhue); }
  .stat-card.pau .stat-value { color: var(--pau); }

  .main { padding: 0 32px 32px; }

  /* MONTH VIEW */
  .month-view { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .month-grid-header { display: grid; grid-template-columns: repeat(5, 1fr); border-bottom: 2px solid var(--border); }
  .day-header { padding: 10px 14px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); border-right: 1px solid var(--border); }
  .day-header:last-child { border-right: none; }
  .month-weeks { display: flex; flex-direction: column; }
  .month-week { display: grid; grid-template-columns: repeat(5, 1fr); border-bottom: 1px solid var(--border); }
  .month-week:last-child { border-bottom: none; }
  .month-cell { padding: 10px 12px; border-right: 1px solid var(--border); min-height: 90px; cursor: pointer; transition: background 0.1s; position: relative; }
  .month-cell:last-child { border-right: none; }
  .month-cell:hover { background: var(--bg); }
  .cell-date { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
  .cell-pill { display: flex; align-items: center; gap: 5px; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 500; margin-bottom: 4px; cursor: pointer; transition: opacity 0.1s; line-height: 1.3; }
  .cell-pill:hover { opacity: 0.8; }
  .cell-pill.foxhue { background: var(--foxhue-light); color: var(--foxhue); border: 1px solid var(--foxhue-mid); }
  .cell-pill.pau { background: var(--pau-light); color: var(--pau); border: 1px solid var(--pau-mid); }
  .pill-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-left: 4px; flex-shrink: 0; }
  .status-dot.approved { background: var(--approved); }
  .status-dot.pending { background: var(--pending); }
  .status-dot.draft { background: var(--draft); }

  /* WEEK VIEW */
  .week-view { display: flex; flex-direction: column; gap: 24px; }
  .week-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .week-header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--text); color: white; }
  .week-badge { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; background: rgba(255,255,255,0.15); padding: 3px 8px; border-radius: 4px; }
  .week-dates { font-size: 13px; opacity: 0.6; }
  .week-grid-header { display: grid; grid-template-columns: 100px 100px 1fr 120px 220px; background: var(--bg); border-bottom: 1px solid var(--border); }
  .week-grid-header div { padding: 8px 16px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); border-right: 1px solid var(--border); }
  .week-grid-header div:last-child { border-right: none; }
  .week-row { display: grid; grid-template-columns: 100px 100px 1fr 120px 220px; border-bottom: 1px solid var(--border); align-items: stretch; min-height: 52px; cursor: pointer; }
  .week-row:last-child { border-bottom: none; }
  .week-row:hover { background: var(--bg); }
  .week-cell { padding: 12px 16px; border-right: 1px solid var(--border); display: flex; align-items: center; font-size: 13px; }
  .week-cell:last-child { border-right: none; }
  .week-day-name { font-weight: 600; }
  .week-date-val { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
  .owner-badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
  .owner-badge.foxhue { background: var(--foxhue-light); color: var(--foxhue); border: 1px solid var(--foxhue-mid); }
  .owner-badge.pau { background: var(--pau-light); color: var(--pau); border: 1px solid var(--pau-mid); }
  .type-tag { display: inline-block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 7px; border-radius: 3px; margin-bottom: 3px; }
  .content-title { font-size: 13px; font-weight: 500; line-height: 1.4; color: var(--text); }
  .content-title.tbc { color: var(--muted); font-style: italic; font-weight: 400; }
  .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; display: inline-flex; align-items: center; gap: 5px; }
  .status-pill.approved { background: var(--approved-light); color: var(--approved); }
  .status-pill.pending { background: var(--pending-light); color: var(--pending); }
  .status-pill.draft { background: var(--draft-light); color: var(--draft); border: 1px solid var(--border); }
  .platforms-cell { display: flex; flex-wrap: wrap; gap: 3px; align-items: center; }
  .platform-dot { width: 22px; height: 22px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all 0.1s;
background: var(--bg); }
  .platform-dot.posted { background: var(--approved); color: white; border-color: var(--approved); }

  /* DAY VIEW */
  .day-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .day-scroll { display: flex; gap: 8px; overflow-x: auto; flex: 1; padding-bottom: 4px; }
  .day-scroll::-webkit-scrollbar { height: 3px; }
  .day-scroll::-webkit-scrollbar-track { background: var(--bg); }
  .day-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .day-pill { flex-shrink: 0; padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; color: var(--muted); transition: all 0.15s; text-align: center; min-width: 72px; }
  .day-pill:hover { border-color: var(--text); color: var(--text); }
  .day-pill.active { background: var(--text); border-color: var(--text); color: white; }
  .day-pill-name { font-weight: 600; font-size: 13px; }
  .day-pill-date { font-size: 11px; opacity: 0.6; margin-top: 1px; }
  .day-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .day-card-header { padding: 16px 24px; border-bottom: 2px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .day-card-title { font-size: 18px; font-weight: 700; letter-spacing: -0.4px; }
  .day-card-date { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); margin-top: 2px; }
  .day-content { padding: 24px; }
  .day-detail-row { display: flex; gap: 12px; margin-bottom: 16px; }
  .day-detail-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); width: 90px; flex-shrink: 0; padding-top: 2px; }
  .day-detail-value { font-size: 14px; font-weight: 500; flex: 1; }
  .day-platforms { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
  .platform-toggle { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; font-weight: 600; color: var(--muted); background: var(--bg); transition: all 0.15s; user-select: none; }
  .platform-toggle.posted { background: var(--approved-light); border-color: var(--approved); color: var(--approved); }
  .platform-toggle:hover { border-color: var(--approved); color: var(--approved); }
  .platform-check { width: 14px; height: 14px; border: 1.5px solid currentColor; border-radius: 3px; display: flex; align-items: center; justify-content: center; }
  .platform-toggle.posted .platform-check::after { content: '✓'; font-size: 10px; line-height: 1; }
  .approve-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .approve-btn { padding: 10px 20px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
  .approve-btn.approve { background: var(--approved); color: white; }
  .approve-btn.approve:hover { background: #047857; }
  .approve-btn.unapprove { background: transparent; border-color: var(--border); color: var(--muted); }
  .approve-btn.unapprove:hover { border-color: var(--pending); color: var(--pending); }
  .approved-badge { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--approved-light); border: 1.5px solid var(--approved); border-radius: var(--radius-sm); color: var(--approved); font-weight: 600; font-size: 13px; }
  .empty-state { text-align: center; padding: 48px 24px; color: var(--muted); }
  .empty-icon { font-size: 32px; margin-bottom: 12px; }

  /* Multi-item day view */
  .day-cards-stack { display: flex; flex-direction: column; gap: 16px; }
  .add-item-btn { width: 100%; padding: 14px; border: 2px dashed var(--border); border-radius: var(--radius); background: transparent; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; color: var(--muted); transition: all 0.15s; margin-top: 16px; }
  .add-item-btn:hover { border-color: var(--foxhue); color: var(--foxhue); background: var(--foxhue-light); }
  .delete-item-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: transparent; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; color: var(--muted); transition: all 0.15s; }
  .delete-item-btn:hover { border-color: #EF4444; color: #EF4444; background: #FEF2F2; }
  .item-number { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 4px; background: var(--bg); color: var(--muted); border: 1px solid var(--border); }

  /* Editable fields in day view */
  .day-edit-select { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; padding: 6px 10px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); cursor: pointer; outline: none; transition: border-color 0.15s; }
  .day-edit-select:hover, .day-edit-select:focus { border-color: var(--foxhue); }
  .day-edit-input { font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; letter-spacing: -0.2px; padding: 6px 10px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); width: 100%; outline: none; transition: border-color 0.15s; }
  .day-edit-input:hover, .day-edit-input:focus { border-color: var(--foxhue); }
  .day-edit-input::placeholder { color: var(--muted); font-style: italic; font-weight: 400; }

  /* Loading overlay */
  .loading-overlay { position: fixed; inset: 0; background: rgba(247,246,242,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 12px; }
  .loading-spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--foxhue); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; }

  @media (max-width: 768px) {
    .header { padding: 14px 16px; } .controls { padding: 10px 16px; flex-wrap: wrap; }
    .stats-bar { padding: 12px 16px; overflow-x: auto; } .main { padding: 0 16px 24px; }
    .legend { display: none; } .week-row { grid-template-columns: 90px 1fr 100px; }
    .week-cell:nth-child(2), .week-cell:nth-child(5) { display: none; }
  }
</style>
</head>

<div id="loadingOverlay" class="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading calendar…</div>
</div>

<div class="header">
  <div class="header-left">
    <div class="logo">
      <div class="logo-mark">M</div>
      <div>
        <div style="font-size:15px;font-weight:700;letter-spacing:-0.3px;">Mighty</div>

      <button class="view-tab" onclick="setView('week', this)">Week</button>

  </div>
  <div class="filter-bar">
    <button class="filter-chip active" onclick="setFilter('all', this)">All</button>
    <button class="filter-chip" onclick="setFilter('foxhue', this)">FoxHue</button>
    <button class="filter-chip" onclick="setFilter('pau', this)">Pau</button>
    <button class="filter-chip" onclick="setFilter('pending', this)">Needs Sign-off</button>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>
<div class="main" id="mainContent"></div>

<script>

const SUPABASE_URL = 'https://wkpllpmmmpnenqegbinc.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndrcGxscG1tbXBuZW5xZWdiaW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjg3MDIsImV4cCI6MjA5MDcwNDcwMn0.O5Il9ImZAEpXwfVMDjpZeyTZn1YOfTokigxozr69sr4';

const sb = {
  headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
  async get(month) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/calendar_approvals?month=eq.${month}&select=*`, { headers: this.headers });
    if (!res.ok) throw new Error(`API error: ${res.status}`);
    const data = await res.json();
    if (!Array.isArray(data)) throw new Error('Unexpected response format');
    return data;
  },
  async upsert(row) {
    row.updated_at = new Date().toISOString();
    const res = await fetch(`${SUPABASE_URL}/rest/v1/calendar_approvals`, {
      method: 'POST',
      headers: { ...this.headers, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify(row)
    });
    return res.ok;
  },
  async delete(id) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/calendar_approvals?id=eq.${id}`, {
      method: 'DELETE',
      headers: this.headers
    });
    return res.ok;
  }
};

// ============================================================
// STATE
// ============================================================
let currentMonth = '2026-03';
let currentView = 'month';
let currentFilter = 'all';
let selectedDay = null;
let data = [];

function setSyncStatus(status, text) {
  const dot = document.getElementById('syncDot');
  const label = document.getElementById('syncText');
  dot.className = 'sync-dot ' + status;
  label.textContent = text;
}

// ============================================================
// SUPABASE DATA LAYER
// ============================================================
async function loadFromSupabase() {
  setSyncStatus('syncing', 'Syncing…');
  try {
    const base = (calendarData[currentMonth] || []).map(i => ({
      ...i,
      slot: 0,
      platforms: Object.fromEntries(PLATFORMS.map(p => [p, false]))
    }));

    const rows = await sb.get(currentMonth);
    const matchedIds = new Set();

    // Merge remote state into base data
    data = base.map(item => {
      const remote = rows.find(r => r.id === itemId(item) || r.id === item.date);
      if (remote) {
        matchedIds.add(remote.id);
        return {
          ...item,
          approved: typeof remote.approved === 'boolean' ? remote.approved : item.approved,
          platforms: { ...item.platforms, ...((remote.platforms && typeof remote.platforms === 'object') ? remote.platforms : {}) },
          type: CONTENT_TYPES.includes(remote.type_override) ? remote.type_override : item.type,
          title: remote.title_override != null ? remote.title_override : item.title
        };
      }
      return item;
    });

    // Append remote-only rows (added items with slot > 0)
    rows.filter(r => !matchedIds.has(r.id) && r.id.match(/^\d{4}-\d{2}-\d{2}-\d+$/)).forEach(r => {
      const parts = r.id.match(/^(\d{4}-\d{2}-\d{2})-(\d+)$/);
      if (!parts) return;
      const date = parts[1], slot = parseInt(parts[2]);
      const baseItem = base.find(b => b.date === date);
      data.push({
        week: baseItem ? baseItem.week : '', day: baseItem ? baseItem.day : '',
        date, slot, owner: baseItem ? baseItem.owner : 'FoxHue',
        type: CONTENT_TYPES.includes(r.type_override) ? r.type_override : 'Blog',
        title: r.title_override != null ? r.title_override : '',
        approved: typeof r.approved === 'boolean' ? r.approved : false,
        platforms: { ...Object.fromEntries(PLATFORMS.map(p => [p, false])), ...((r.platforms && typeof r.platforms === 'object') ? r.platforms : {}) }
      });
    });

    setSyncStatus('synced', 'Live');
    document.getElementById('loadingOverlay').style.display = 'none';
    render();
  } catch(e) {
    setSyncStatus('error', 'Offline');
    data = (calendarData[currentMonth] || []).map(i => ({
      ...i,
      slot: 0,
      platforms: Object.fromEntries(PLATFORMS.map(p => [p, false]))
    }));
    document.getElementById('loadingOverlay').style.display = 'none';
    render();
  }
}

async function saveToSupabase(date, slot, changes) {
  setSyncStatus('syncing', 'Saving…');
  const item = data.find(i => i.date === date && i.slot === slot);
  if (!item) return;
  const ok = await sb.upsert({
    id: itemId(item),
    month: currentMonth,
    approved: item.approved,
    platforms: item.platforms,
    ...changes
  });
  if (ok) {
    setSyncStatus('synced', 'Saved ✓');
    setTimeout(() => setSyncStatus('synced', 'Live'), 2000);
  } else {
    setSyncStatus('error', 'Save failed');
  }
  return ok;
}

// Poll for remote changes every 30 seconds
setInterval(async () => {
  try {
    const rows = await sb.get(currentMonth);
    let changed = false;
    const matchedIds = new Set();

    data = data.map(item => {
      const remote = rows.find(r => r.id === itemId(item) || (item.slot === 0 && r.id === item.date));
      if (remote) {
        matchedIds.add(remote.id);
        const newApproved = typeof remote.approved === 'boolean' ? remote.approved : item.approved;
        const newPlatforms = { ...item.platforms, ...((remote.platforms && typeof remote.platforms === 'object') ? remote.platforms : {}) };
        const newType = CONTENT_TYPES.includes(remote.type_override) ? remote.type_override : item.type;
        const newTitle = remote.title_override != null ? remote.title_override : item.title;
        if (newApproved !== item.approved || JSON.stringify(newPlatforms) !== JSON.stringify(item.platforms) || newType !== item.type || newTitle !== item.title) {
          changed = true;
          return { ...item, approved: newApproved, platforms: newPlatforms, type: newType, title: newTitle };
        }
      }
      return item;
    });

    // Append remote-only rows (added by another browser)
    const base = (calendarData[currentMonth] || []).map(i => ({ ...i, slot: 0 }));
    rows.filter(r => !matchedIds.has(r.id) && r.id.match(/^\d{4}-\d{2}-\d{2}-\d+$/) && !data.some(d => itemId(d) === r.id)).forEach(r => {
      const parts = r.id.match(/^(\d{4}-\d{2}-\d{2})-(\d+)$/);
      if (!parts) return;
      const date = parts[1], slot = parseInt(parts[2]);
      const baseItem = base.find(b => b.date === date);
      data.push({
        week: baseItem ? baseItem.week : '', day: baseItem ? baseItem.day : '',
        date, slot, owner: baseItem ? baseItem.owner : 'FoxHue',
        type: CONTENT_TYPES.includes(r.type_override) ? r.type_override : 'Blog',
        title: r.title_override != null ? r.title_override : '',
        approved: typeof r.approved === 'boolean' ? r.approved : false,
        platforms: { ...Object.fromEntries(PLATFORMS.map(p => [p, false])), ...((r.platforms && typeof r.platforms === 'object') ? r.platforms : {}) }
      });
      changed = true;
    });

    // Remove items deleted remotely
    const remoteIds = new Set(rows.map(r => r.id));
    const before = data.length;
    data = data.filter(item => item.slot === 0 || remoteIds.has(itemId(item)));
    if (data.length !== before) changed = true;

    if (changed) {
      const isEditing = document.activeElement && (document.activeElement.classList.contains('day-edit-input') || document.activeElement.classList.contains('day-edit-select'));
      if (!isEditing) render();
    }
  } catch(e) { setSyncStatus('error', 'Sync failed'); }
}, 30000);

// ============================================================
// HELPERS
// ============================================================
function getWeeks() {
  const weeks = {};
  data.forEach(item => {
    if (!weeks[item.week]) weeks[item.week] = [];
    weeks[item.week].push(item);
  });
  return weeks;
}
function getDayOrder(day) { return ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].indexOf(day); }
function formatDate(dateStr) { return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'short' }); }
function getOwnerClass(owner) { return owner.toLowerCase() === 'foxhue' ? 'foxhue' : 'pau'; }
function getStatusClass(item) { if (item.approved === true) return 'approved'; if (item.approved === null) return 'draft'; return 'pending'; }
function getStatusLabel(item) { if (item.approved === true) return '✓ Approved'; if (item.approved === null) return 'TBC'; return 'Needs Sign-off'; }
function filteredData() {
  return data.filter(item => {
    if (currentFilter === 'foxhue') return item.owner === 'FoxHue';
    if (currentFilter === 'pau') return item.owner === 'Pau';
    if (currentFilter === 'pending') return item.approved === false;
    return true;
  });
}
function getTypeColor(type) {
  return { 'Blog':'#2563EB','Partner Blog':'#0891B2','Mighty Selects':'#7C3AED','Customer Spotlight':'#D97706','Video':'#DC2626','Image/Carousel':'#059669' }[type] || '#6B7280';
}

// ============================================================
// STATS
// ============================================================
function renderStats() {
  const approved = data.filter(d => d.approved === true).length;
  const pending = data.filter(d => d.approved === false).length;
  const foxhue = data.filter(d => d.owner === 'FoxHue').length;
  const pau = data.filter(d => d.owner === 'Pau').length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card approved"><div class="stat-value">${approved}</div><div class="stat-label">Approved</div></div>
    <div class="stat-card pending"><div class="stat-value">${pending}</div><div class="stat-label">Needs Sign-off</div></div>
    <div class="stat-card"><div class="stat-value">${data.length}</div><div class="stat-label">Total Pieces</div></div>
    <div class="stat-card foxhue"><div class="stat-value">${foxhue}</div><div class="stat-label">FoxHue</div></div>
    <div class="stat-card pau"><div class="stat-value">${pau}</div><div class="stat-label">Pau</div></div>`;
}

// ============================================================
// MONTH VIEW
// ============================================================
function renderMonthView() {
  const weeks = getWeeks();
  const fd = filteredData();
  const fdSet = new Set(fd.map(i => itemId(i)));
  const days = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
  let html = `<div class="month-view"><div class="month-grid-header">${days.map(d=>`<div class="day-header">${d}</div>`).join('')}</div><div class="month-weeks">`;
  Object.entries(weeks).forEach(([wk, items]) => {
    html += `<div class="month-week">`;
    days.forEach(day => {
      const dayItems = items.filter(i => i.day === day && fdSet.has(itemId(i)));
      if (!dayItems.length) { html += `<div class="month-cell"></div>`; return; }
      const date = dayItems[0].date;
      const pillsHtml = dayItems.map(item => {
        const sc = getStatusClass(item);
        const short = item.title.length > 40 ? item.title.slice(0,38)+'…' : item.title;
        return `<div class="cell-pill ${getOwnerClass(item.owner)}" title="${esc(item.title)}">
          <div class="pill-dot"></div>
          <span style="flex:1;min-width:0">
            <span style="font-size:9px;font-weight:600;opacity:0.6;text-transform:uppercase;letter-spacing:0.4px;display:block">${esc(item.type)}</span>
            <span ${item.title==='TBC'?'style="font-style:italic;opacity:0.6"':''}>${esc(short)}</span>
          </span>
          <div class="status-dot ${sc}"></div>
        </div>`;
      }).join('');
      html += `<div class="month-cell" onclick="showDayDetail('${date}')">
        <div class="cell-date"><span>${formatDate(date)}</span><span style="font-size:9px;color:var(--muted)">${wk}</span></div>
        ${pillsHtml}
      </div>`;
    });
    html += `</div>`;
  });
  html += `</div></div>`;
  document.getElementById('mainContent').innerHTML = html;
}

// ============================================================
// WEEK VIEW
// ============================================================
function renderWeekView() {
  const weeks = getWeeks();
  const fdIds = new Set(filteredData().map(i => itemId(i)));
  let html = `<div class="week-view">`;
  Object.entries(weeks).forEach(([wk, items]) => {
    const sorted = items.sort((a,b) => getDayOrder(a.day)-getDayOrder(b.day) || a.slot-b.slot).filter(i => fdIds.has(itemId(i)));
    if (!sorted.length) return;
    const dates = sorted.map(i => formatDate(i.date));
    html += `<div class="week-section">
      <div class="week-header"><span class="week-badge">${wk}</span><span class="week-dates">${dates[0]} – ${dates[dates.length-1]}</span></div>
      <div class="week-grid-header"><div>Day</div><div>Date</div><div>Content</div><div>Status</div><div>Platforms</div></div>`;
    sorted.forEach(item => {
      const plats = PLATFORMS.map(p => `<div class="platform-dot ${item.platforms[p]?'posted':''}" onclick="event.stopPropagation();togglePlatform('${item.date}',${item.slot},'${p}')" title="${p}">${p[0]}</div>`).join('');
      html += `<div class="week-row" onclick="showDayDetail('${item.date}')">
        <div class="week-cell"><div><div class="week-day-name">${item.day}</div><div style="margin-top:2px"><span class="owner-badge ${getOwnerClass(item.owner)}">${item.owner}</span></div></div></div>
        <div class="week-cell"><span class="week-date-val">${formatDate(item.date)}</span></div>
        <div class="week-cell" style="flex-direction:column;align-items:flex-start;gap:3px">
          <span class="type-tag" style="color:${getTypeColor(item.type)};border:1px solid ${getTypeColor(item.type)}20;background:${getTypeColor(item.type)}10">${esc(item.type)}</span>
          <div class="content-title ${item.title==='TBC'?'tbc':''}">${esc(item.title)}</div>
        </div>
        <div class="week-cell"><span class="status-pill ${getStatusClass(item)}">${getStatusLabel(item)}</span></div>
        <div class="week-cell"><div class="platforms-cell">${plats}</div></div>
      </div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;
  document.getElementById('mainContent').innerHTML = html;
}

// ============================================================
// DAY VIEW
// ============================================================
function renderDayView() {
  const fd = filteredData().sort((a,b) => new Date(a.date)-new Date(b.date));
  if (!selectedDay && fd.length) selectedDay = fd[0].date;

  // Deduplicate pills by date
  const seenDates = new Set();
  const pills = fd.filter(item => { if (seenDates.has(item.date)) return false; seenDates.add(item.date); return true; }).map(item => {
    const d = new Date(item.date+'T00:00:00');
    return `<div class="day-pill ${item.date===selectedDay?'active':''}" onclick="selectDay('${item.date}')">
      <div class="day-pill-name">${d.toLocaleDateString('en-GB',{weekday:'short'})}</div>
      <div class="day-pill-date">${d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</div>
    </div>`;
  }).join('');

  const dayItems = data.filter(i => i.date === selectedDay).sort((a,b) => a.slot - b.slot);
  let detail = '';
  if (dayItems.length) {
    const cards = dayItems.map((item, idx) => {
      const plats = PLATFORMS.map(p => `<div class="platform-toggle ${item.platforms[p]?'posted':''}" onclick="togglePlatform('${item.date}',${item.slot},'${p}')"><div class="platform-check"></div>${p}</div>`).join('');
      const approveSection = item.approved === null ? '' : item.approved
        ? `<div class="approve-section"><div class="approved-badge">✓ Approved by Mighty</div><button class="approve-btn unapprove" onclick="toggleApproval('${item.date}',${item.slot})">Revoke Approval</button></div>`
        : `<div class="approve-section"><div style="color:var(--muted);font-size:13px">Awaiting Mighty sign-off</div><button class="approve-btn approve" onclick="toggleApproval('${item.date}',${item.slot})">✓ Mark as Approved</button></div>`;
      const deleteBtn = item.slot > 0 ? `<button class="delete-item-btn" onclick="deleteItem('${item.date}',${item.slot})">Delete</button>` : '';
      return `<div class="day-card">
        <div class="day-card-header">
          <div>
            <div style="display:flex;align-items:center;gap:8px"><div class="day-card-title">${item.day}</div><span class="item-number">Item ${idx+1}</span></div>
            <div class="day-card-date">${formatDate(item.date)} · ${item.week}</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">${deleteBtn}<span class="owner-badge ${getOwnerClass(item.owner)}">${item.owner}</span><span class="status-pill ${getStatusClass(item)}">${getStatusLabel(item)}</span></div>
        </div>
        <div class="day-content">
          <div class="day-detail-row"><div class="day-detail-label">Type</div><div class="day-detail-value">
            <select class="day-edit-select" style="color:${getTypeColor(item.type)}" onchange="updateType('${item.date}',${item.slot},this.value)">
              ${CONTENT_TYPES.map(t => `<option value="${t}" ${t===item.type?'selected':''}>${t}</option>`).join('')}
            </select>
          </div></div>
          <div class="day-detail-row"><div class="day-detail-label">Title</div><div class="day-detail-value">
            <input class="day-edit-input" value="${esc(item.title)}" placeholder="Enter title…" onblur="updateTitle('${item.date}',${item.slot},this.value)" onkeydown="if(event.key==='Enter')this.blur()">
          </div></div>
          ${item.approved !== null ? `<div style="margin-top:16px"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);margin-bottom:10px">Platform Publishing</div><div class="day-platforms">${plats}</div></div>` : ''}
          ${approveSection}
        </div>
      </div>`;
    }).join('');
    detail = `<div class="day-cards-stack">${cards}</div><button class="add-item-btn" onclick="addItem('${selectedDay}')">+ Add Content</button>`;
  }
  document.getElementById('mainContent').innerHTML = `<div class="day-nav"><div class="day-scroll">${pills}</div></div>${detail}`;
}

// ============================================================
// INTERACTIONS
// ============================================================
async function toggleApproval(date, slot) {
  const item = data.find(i => i.date === date && i.slot === slot);
  if (!item || item.approved === null) return;
  item.approved = !item.approved;
  render();
  await saveToSupabase(date, slot);
}

async function updateType(date, slot, newType) {
  const item = data.find(i => i.date === date && i.slot === slot);
  if (!item || item.type === newType) return;
  item.type = newType;
  renderStats();
  await saveToSupabase(date, slot, { type_override: newType });
}

async function updateTitle(date, slot, newTitle) {
  const item = data.find(i => i.date === date && i.slot === slot);
  if (!item || item.title === newTitle) return;
  item.title = newTitle;
  await saveToSupabase(date, slot, { title_override: newTitle });
}

async function togglePlatform(date, slot, platform) {
  const item = data.find(i => i.date === date && i.slot === slot);
  if (!item) return;
  item.platforms[platform] = !item.platforms[platform];
  render();
  await saveToSupabase(date, slot);
}

async function addItem(date) {
  const existing = data.filter(i => i.date === date);
  if (!existing.length) return;
  const maxSlot = existing.reduce((max, i) => Math.max(max, i.slot), -1);
  const baseItem = existing.find(i => i.slot === 0) || existing[0];
  const newItem = {
    week: baseItem.week, day: baseItem.day,
    date, slot: maxSlot + 1, owner: baseItem.owner,
    type: 'Blog', title: '', approved: false,
    platforms: Object.fromEntries(PLATFORMS.map(p => [p, false]))
  };
  data.push(newItem);
  render();
  const ok = await saveToSupabase(date, newItem.slot, { type_override: newItem.type, title_override: newItem.title });
  if (!ok) {
    const idx = data.findIndex(i => i.date === date && i.slot === newItem.slot);
    if (idx !== -1) data.splice(idx, 1);
    render();
  }
}

async function deleteItem(date, slot) {
  if (slot === 0) return;
  if (!confirm('Delete this content item?')) return;
  const idx = data.findIndex(i => i.date === date && i.slot === slot);
  if (idx === -1) return;
  const id = itemId(data[idx]);
  setSyncStatus('syncing', 'Deleting…');
  const ok = await sb.delete(id);
  if (ok) {
    data.splice(idx, 1);
    render();
    setSyncStatus('synced', 'Deleted ✓');
    setTimeout(() => setSyncStatus('synced', 'Live'), 2000);
  } else {
    setSyncStatus('error', 'Delete failed');
  }
}

function showDayDetail(date) {
  selectedDay = date;
  setView('day');
  document.querySelectorAll('.view-tab').forEach((t,i) => t.classList.toggle('active', i===2));
}
function selectDay(date) { selectedDay = date; renderDayView(); }
function setView(view, btn) {
  currentView = view;
  if (btn) { document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active')); btn.classList.add('active'); }
  render();
}
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function changeMonth(dir) {
  const [y,m] = currentMonth.split('-').map(Number);
  let nm = m+dir, ny = y;
  if (nm>12){nm=1;ny++;} if (nm<1){nm=12;ny--;}
  currentMonth = `${ny}-${String(nm).padStart(2,'0')}`;
  selectedDay = null;
  loadFromSupabase();
}

function render() {
  const [y,m] = currentMonth.split('-').map(Number);
  document.getElementById('monthLabel').textContent = new Date(y,m-1,1).toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  renderStats();
  if (currentView==='month') renderMonthView();
  else if (currentView==='week') renderWeekView();
  else renderDayView();
}

// Init
loadFromSupabase();
