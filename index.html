<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mighty Social Content Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --border: #E4E2DC;
    --text: #1A1A18;
    --muted: #8A8880;
    --foxhue: #2563EB;
    --foxhue-light: #EFF6FF;
    --foxhue-mid: #BFDBFE;
    --pau: #7C3AED;
    --pau-light: #F5F3FF;
    --pau-mid: #DDD6FE;
    --approved: #059669;
    --approved-light: #ECFDF5;
    --pending: #D97706;
    --pending-light: #FFFBEB;
    --draft: #6B7280;
    --draft-light: #F9FAFB;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* HEADER */
  .header {
    background: var(--text);
    color: white;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    background: var(--foxhue);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: -0.5px;
  }

  .header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .header-sub {
    font-size: 12px;
    opacity: 0.5;
    margin-top: 1px;
    font-family: 'DM Mono', monospace;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    opacity: 0.8;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* CONTROLS */
  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .controls-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .month-nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .month-btn {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    transition: all 0.15s;
  }

  .month-btn:hover {
    border-color: var(--text);
    color: var(--text);
  }

  .month-label {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
    min-width: 120px;
    text-align: center;
  }

  .view-tabs {
    display: flex;
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 3px;
    gap: 2px;
  }

  .view-tab {
    padding: 6px 14px;
    border: none;
    background: transparent;
    border-radius: 5px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    transition: all 0.15s;
  }

  .view-tab.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: var(--shadow);
  }

  .filter-bar {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .filter-chip {
    padding: 5px 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
  }

  .filter-chip.active {
    background: var(--text);
    border-color: var(--text);
    color: white;
  }

  /* STATS BAR */
  .stats-bar {
    padding: 16px 32px;
    display: flex;
    gap: 12px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 18px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 120px;
  }

  .stat-value {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .stat-card.approved .stat-value { color: var(--approved); }
  .stat-card.pending .stat-value { color: var(--pending); }
  .stat-card.foxhue .stat-value { color: var(--foxhue); }
  .stat-card.pau .stat-value { color: var(--pau); }

  /* MAIN CONTENT */
  .main {
    padding: 0 32px 32px;
  }

  /* ===== MONTH VIEW ===== */
  .month-view {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .month-grid-header {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    border-bottom: 2px solid var(--border);
  }

  .day-header {
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    border-right: 1px solid var(--border);
  }

  .day-header:last-child { border-right: none; }

  .month-weeks {
    display: flex;
    flex-direction: column;
  }

  .month-week {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    border-bottom: 1px solid var(--border);
  }

  .month-week:last-child { border-bottom: none; }

  .month-cell {
    padding: 10px 12px;
    border-right: 1px solid var(--border);
    min-height: 90px;
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
  }

  .month-cell:last-child { border-right: none; }
  .month-cell:hover { background: var(--bg); }

  .cell-date {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .cell-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    margin-bottom: 4px;
    cursor: pointer;
    transition: opacity 0.1s;
    line-height: 1.3;
  }

  .cell-pill:hover { opacity: 0.8; }

  .cell-pill.foxhue {
    background: var(--foxhue-light);
    color: var(--foxhue);
    border: 1px solid var(--foxhue-mid);
  }

  .cell-pill.pau {
    background: var(--pau-light);
    color: var(--pau);
    border: 1px solid var(--pau-mid);
  }

  .pill-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    display: inline-block;
    margin-left: 4px;
    flex-shrink: 0;
  }

  .status-dot.approved { background: var(--approved); }
  .status-dot.pending { background: var(--pending); }
  .status-dot.draft { background: var(--draft); }

  /* ===== WEEK VIEW ===== */
  .week-view {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .week-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .week-header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--text);
    color: white;
  }

  .week-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    background: rgba(255,255,255,0.15);
    padding: 3px 8px;
    border-radius: 4px;
  }

  .week-dates {
    font-size: 13px;
    opacity: 0.6;
  }

  .week-row {
    display: grid;
    grid-template-columns: 100px 100px 1fr 120px 220px;
    border-bottom: 1px solid var(--border);
    align-items: stretch;
    min-height: 52px;
  }

  .week-row:last-child { border-bottom: none; }

  .week-row:hover { background: var(--bg); }

  .week-cell {
    padding: 12px 16px;
    border-right: 1px solid var(--border);
    display: flex;
    align-items: center;
    font-size: 13px;
  }

  .week-cell:last-child { border-right: none; }

  .week-day-name {
    font-weight: 600;
  }

  .week-date-val {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .owner-badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .owner-badge.foxhue {
    background: var(--foxhue-light);
    color: var(--foxhue);
    border: 1px solid var(--foxhue-mid);
  }

  .owner-badge.pau {
    background: var(--pau-light);
    color: var(--pau);
    border: 1px solid var(--pau-mid);
  }

  .type-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 7px;
    border-radius: 3px;
    margin-bottom: 3px;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
  }

  .content-title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.4;
    color: var(--text);
  }

  .content-title.tbc {
    color: var(--muted);
    font-style: italic;
    font-weight: 400;
  }

  .status-pill {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .status-pill.approved {
    background: var(--approved-light);
    color: var(--approved);
  }

  .status-pill.pending {
    background: var(--pending-light);
    color: var(--pending);
  }

  .status-pill.draft {
    background: var(--draft-light);
    color: var(--draft);
    border: 1px solid var(--border);
  }

  .platforms-cell {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    align-items: center;
  }

  .platform-dot {
    width: 22px;
    height: 22px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 700;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.1s;
    background: var(--bg);
  }

  .platform-dot.posted {
    background: var(--approved);
    color: white;
    border-color: var(--approved);
  }

  .platform-dot:hover {
    border-color: var(--text);
  }

  /* ===== DAY VIEW ===== */
  .day-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .day-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    flex: 1;
    padding-bottom: 4px;
  }

  .day-scroll::-webkit-scrollbar { height: 3px; }
  .day-scroll::-webkit-scrollbar-track { background: var(--bg); }
  .day-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .day-pill {
    flex-shrink: 0;
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    transition: all 0.15s;
    text-align: center;
    min-width: 72px;
  }

  .day-pill:hover {
    border-color: var(--text);
    color: var(--text);
  }

  .day-pill.active {
    background: var(--text);
    border-color: var(--text);
    color: white;
  }

  .day-pill-name { font-weight: 600; font-size: 13px; }
  .day-pill-date { font-size: 11px; opacity: 0.6; margin-top: 1px; }

  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .day-card-header {
    padding: 16px 24px;
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .day-card-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.4px;
  }

  .day-card-date {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .day-content {
    padding: 24px;
  }

  .day-detail-row {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }

  .day-detail-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    width: 90px;
    flex-shrink: 0;
    padding-top: 2px;
  }

  .day-detail-value {
    font-size: 14px;
    font-weight: 500;
    flex: 1;
  }

  .day-platforms {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .platform-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    background: var(--bg);
    transition: all 0.15s;
    user-select: none;
  }

  .platform-toggle.posted {
    background: var(--approved-light);
    border-color: var(--approved);
    color: var(--approved);
  }

  .platform-toggle:hover {
    border-color: var(--approved);
    color: var(--approved);
  }

  .platform-check {
    width: 14px;
    height: 14px;
    border: 1.5px solid currentColor;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .platform-toggle.posted .platform-check::after {
    content: '✓';
    font-size: 10px;
    line-height: 1;
  }

  .approve-section {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .approve-btn {
    padding: 10px 20px;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.15s;
  }

  .approve-btn.approve {
    background: var(--approved);
    color: white;
  }

  .approve-btn.approve:hover {
    background: #047857;
  }

  .approve-btn.unapprove {
    background: transparent;
    border-color: var(--border);
    color: var(--muted);
  }

  .approve-btn.unapprove:hover {
    border-color: var(--pending);
    color: var(--pending);
  }

  .approved-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--approved-light);
    border: 1.5px solid var(--approved);
    border-radius: var(--radius-sm);
    color: var(--approved);
    font-weight: 600;
    font-size: 13px;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
  }

  .empty-icon {
    font-size: 32px;
    margin-bottom: 12px;
  }

  .empty-text {
    font-size: 14px;
  }

  /* WEEK GRID HEADER */
  .week-grid-header {
    display: grid;
    grid-template-columns: 100px 100px 1fr 120px 220px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }

  .week-grid-header div {
    padding: 8px 16px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--muted);
    border-right: 1px solid var(--border);
  }

  .week-grid-header div:last-child { border-right: none; }

  /* Tooltip */
  [title]:hover::after {
    content: attr(title);
    position: absolute;
    bottom: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: white;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 4px;
    white-space: nowrap;
    z-index: 999;
    pointer-events: none;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .header { padding: 14px 16px; }
    .controls { padding: 10px 16px; flex-wrap: wrap; }
    .stats-bar { padding: 12px 16px; overflow-x: auto; }
    .main { padding: 0 16px 24px; }
    .legend { display: none; }
    .week-row { grid-template-columns: 90px 1fr 100px; }
    .week-cell:nth-child(2), .week-cell:nth-child(5) { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">
      <div class="logo-mark">M</div>
      <div>
        <div style="font-size:15px;font-weight:700;letter-spacing:-0.3px;">Mighty</div>
        <div class="header-sub">Content Calendar</div>
      </div>
    </div>
  </div>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--foxhue)"></div>
      FoxHue
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--pau)"></div>
      Pau
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--approved)"></div>
      Approved
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--pending)"></div>
      Pending
    </div>
  </div>
</div>

<div class="controls">
  <div class="controls-left">
    <div class="month-nav">
      <button class="month-btn" onclick="changeMonth(-1)">&#8249;</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="month-btn" onclick="changeMonth(1)">&#8250;</button>
    </div>
    <div class="view-tabs">
      <button class="view-tab active" onclick="setView('month', this)">Month</button>
      <button class="view-tab" onclick="setView('week', this)">Week</button>
      <button class="view-tab" onclick="setView('day', this)">Day</button>
    </div>
  </div>
  <div class="filter-bar">
    <button class="filter-chip active" onclick="setFilter('all', this)">All</button>
    <button class="filter-chip" onclick="setFilter('foxhue', this)">FoxHue</button>
    <button class="filter-chip" onclick="setFilter('pau', this)">Pau</button>
    <button class="filter-chip" onclick="setFilter('pending', this)">Needs Sign-off</button>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="main" id="mainContent"></div>

<script>
// ============================
// DATA
// ============================
const PLATFORMS = ['LinkedIn', 'Google', 'Reddit', 'YouTube', 'X', 'Facebook', 'Instagram'];

const calendarData = {

    { week:'W1', day:'Tuesday',   date:'2026-03-03', owner:'Pau',    type:'Video',           title:'TBC',                                                                   status:'TBC',      approved:null,  platforms:{LinkedIn:false,Google:false,Reddit:false,YouTube:false,X:false,Facebook:false,Instagram:false} },

// State
let currentMonth = '2026-03';
let currentView = 'month';
let currentFilter = 'all';
let selectedDay = null;

// Load/save from localStorage
function getStorageKey() { return `mighty_calendar_${currentMonth}`; }

function loadState() {
  try {
    const saved = localStorage.getItem(getStorageKey());
    if (saved) {
      const parsed = JSON.parse(saved);
      const base = calendarData[currentMonth] || [];
      return base.map((item, i) => {
        const s = parsed[i] || {};
        return { ...item, approved: s.approved !== undefined ? s.approved : item.approved, platforms: { ...item.platforms, ...(s.platforms || {}) } };
      });
    }
  } catch(e) {}
  return (calendarData[currentMonth] || []).map(i => ({...i, platforms: {...i.platforms}}));
}

function saveState(data) {
  try {
    localStorage.setItem(getStorageKey(), JSON.stringify(data.map(i => ({ approved: i.approved, platforms: i.platforms }))));
  } catch(e) {}
}

let data = loadState();

// ============================
// HELPERS
// ============================
function getWeeks() {
  const weeks = {};
  data.forEach(item => {
    if (!weeks[item.week]) weeks[item.week] = [];
    weeks[item.week].push(item);
  });
  return weeks;
}

function getDayOrder(day) {
  return ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].indexOf(day);
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
}

function getOwnerClass(owner) {
  return owner.toLowerCase() === 'foxhue' ? 'foxhue' : 'pau';
}

function getStatusClass(item) {
  if (item.approved === true) return 'approved';
  if (item.status === 'TBC') return 'draft';
  return 'pending';
}

function getStatusLabel(item) {
  if (item.approved === true) return '✓ Approved';
  if (item.status === 'TBC') return 'TBC';
  return 'Needs Sign-off';
}

function filteredData() {
  return data.filter(item => {
    if (currentFilter === 'foxhue') return item.owner === 'FoxHue';
    if (currentFilter === 'pau') return item.owner === 'Pau';
    if (currentFilter === 'pending') return item.approved === false;
    return true;
  });
}

function getTypeColor(type) {
  const colors = {
    'Blog': '#2563EB',
    'Partner Blog': '#0891B2',
    'Mighty Selects': '#7C3AED',
    'Customer Spotlight': '#D97706',
    'Video': '#DC2626',
    'Image/Carousel': '#059669',
  };
  return colors[type] || '#6B7280';
}

// ============================
// STATS
// ============================
function renderStats() {
  const total = data.length;
  const approvedCount = data.filter(d => d.approved === true).length;
  const pendingCount = data.filter(d => d.approved === false).length;
  const foxhueCount = data.filter(d => d.owner === 'FoxHue').length;
  const pauCount = data.filter(d => d.owner === 'Pau').length;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card approved">
      <div class="stat-value">${approvedCount}</div>
      <div class="stat-label">Approved</div>
    </div>
    <div class="stat-card pending">
      <div class="stat-value">${pendingCount}</div>
      <div class="stat-label">Needs Sign-off</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${total}</div>
      <div class="stat-label">Total Pieces</div>
    </div>
    <div class="stat-card foxhue">
      <div class="stat-value">${foxhueCount}</div>
      <div class="stat-label">FoxHue</div>
    </div>
    <div class="stat-card pau">
      <div class="stat-value">${pauCount}</div>
      <div class="stat-label">Pau</div>
    </div>
  `;
}

// ============================
// MONTH VIEW
// ============================
function renderMonthView() {
  const weeks = getWeeks();
  const fd = filteredData();
  const fdDates = new Set(fd.map(i => i.date));
  const days = ['Monday','Tuesday','Wednesday','Thursday','Friday'];

  let html = `<div class="month-view">
    <div class="month-grid-header">
      ${days.map(d => `<div class="day-header">${d}</div>`).join('')}
    </div>
    <div class="month-weeks">`;

  Object.entries(weeks).forEach(([wk, items]) => {
    html += `<div class="month-week">`;
    days.forEach(day => {
      const item = items.find(i => i.day === day);
      if (!item || !fdDates.has(item.date)) {
        html += `<div class="month-cell"></div>`;
        return;
      }
      const ownerClass = getOwnerClass(item.owner);
      const statusClass = getStatusClass(item);
      const shortTitle = item.title.length > 40 ? item.title.slice(0,38)+'…' : item.title;
      const isTBC = item.title === 'TBC';
      html += `
        <div class="month-cell" onclick="showDayDetail('${item.date}')">
          <div class="cell-date">
            <span>${formatDate(item.date)}</span>
            <span style="font-size:9px;color:var(--muted)">${wk}</span>
          </div>
          <div class="cell-pill ${ownerClass}" title="${item.title}">
            <div class="pill-dot"></div>
            <span style="flex:1;min-width:0">
              <span style="font-size:9px;font-weight:600;opacity:0.6;text-transform:uppercase;letter-spacing:0.4px;display:block">${item.type}</span>
              <span style="${isTBC ? 'font-style:italic;opacity:0.6' : ''}">${shortTitle}</span>
            </span>
            <div class="status-dot ${statusClass}"></div>
          </div>
        </div>`;
    });
    html += `</div>`;
  });

  html += `</div></div>`;
  document.getElementById('mainContent').innerHTML = html;
}

// ============================
// WEEK VIEW
// ============================
function renderWeekView() {
  const weeks = getWeeks();
  const fd = filteredData();
  const fdDates = new Set(fd.map(i => i.date));

  let html = `<div class="week-view">`;

  Object.entries(weeks).forEach(([wk, items]) => {
    const sortedItems = items.sort((a,b) => getDayOrder(a.day) - getDayOrder(b.day));
    const filteredItems = sortedItems.filter(i => fdDates.has(i.date));
    if (filteredItems.length === 0) return;

    const dates = filteredItems.map(i => formatDate(i.date));
    const dateRange = dates.length > 1 ? `${dates[0]} – ${dates[dates.length-1]}` : dates[0];

    html += `
      <div class="week-section">
        <div class="week-header">
          <span class="week-badge">${wk}</span>
          <span class="week-dates">${dateRange}</span>
        </div>
        <div class="week-grid-header">
          <div>Day</div><div>Date</div><div>Content</div><div>Status</div><div>Platforms</div>
        </div>`;

    filteredItems.forEach(item => {
      const ownerClass = getOwnerClass(item.owner);
      const statusClass = getStatusClass(item);
      const isTBC = item.title === 'TBC';
      const platformsHtml = PLATFORMS.map(p => {
        const posted = item.platforms[p];
        return `<div class="platform-dot ${posted ? 'posted' : ''}" onclick="event.stopPropagation();togglePlatform('${item.date}','${p}')" title="${p}">${p.charAt(0)}</div>`;
      }).join('');

      html += `
        <div class="week-row" onclick="showDayDetail('${item.date}')">
          <div class="week-cell">
            <div>
              <div class="week-day-name">${item.day}</div>
              <div style="margin-top:2px"><span class="owner-badge ${ownerClass}">${item.owner}</span></div>
            </div>
          </div>
          <div class="week-cell"><span class="week-date-val">${formatDate(item.date)}</span></div>
          <div class="week-cell" style="flex-direction:column;align-items:flex-start;gap:3px;">
            <div><span class="type-tag" style="color:${getTypeColor(item.type)};border-color:${getTypeColor(item.type)}20;background:${getTypeColor(item.type)}10">${item.type}</span></div>
            <div class="content-title ${isTBC ? 'tbc' : ''}">${item.title}</div>
          </div>
          <div class="week-cell">
            <span class="status-pill ${statusClass}">${getStatusLabel(item)}</span>
          </div>
          <div class="week-cell">
            <div class="platforms-cell">${platformsHtml}</div>
          </div>
        </div>`;
    });

    html += `</div>`;
  });

  html += `</div>`;
  document.getElementById('mainContent').innerHTML = html;
}

// ============================
// DAY VIEW
// ============================
function renderDayView() {
  const fd = filteredData().sort((a,b) => new Date(a.date) - new Date(b.date));
  if (!selectedDay && fd.length > 0) selectedDay = fd[0].date;

  const dayPills = fd.map(item => {
    const d = new Date(item.date + 'T00:00:00');
    const dayName = d.toLocaleDateString('en-GB', {weekday:'short'});
    const dayNum = d.toLocaleDateString('en-GB', {day:'numeric', month:'short'});
    const isActive = item.date === selectedDay;
    return `
      <div class="day-pill ${isActive ? 'active' : ''}" onclick="selectDay('${item.date}')">
        <div class="day-pill-name">${dayName}</div>
        <div class="day-pill-date">${dayNum}</div>
      </div>`;
  }).join('');

  const item = data.find(i => i.date === selectedDay);

  let detailHtml = '';
  if (item) {
    const ownerClass = getOwnerClass(item.owner);
    const statusClass = getStatusClass(item);
    const platformsHtml = PLATFORMS.map(p => {
      const posted = item.platforms[p];
      return `
        <div class="platform-toggle ${posted ? 'posted' : ''}" onclick="togglePlatform('${item.date}','${p}')">
          <div class="platform-check"></div>
          ${p}
        </div>`;
    }).join('');

    const approveSection = item.approved === null ? '' : item.approved
      ? `<div class="approve-section">
           <div class="approved-badge">✓ Approved by Mighty</div>
           <button class="approve-btn unapprove" onclick="toggleApproval('${item.date}')">Revoke Approval</button>
         </div>`
      : `<div class="approve-section">
           <div style="color:var(--muted);font-size:13px;">Awaiting Mighty sign-off</div>
           <button class="approve-btn approve" onclick="toggleApproval('${item.date}')">✓ Mark as Approved</button>
         </div>`;

    detailHtml = `
      <div class="day-card">
        <div class="day-card-header">
          <div>
            <div class="day-card-title">${item.day}</div>
            <div class="day-card-date">${formatDate(item.date)} · ${item.week}</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <span class="owner-badge ${ownerClass}">${item.owner}</span>
            <span class="status-pill ${statusClass}">${getStatusLabel(item)}</span>
          </div>
        </div>
        <div class="day-content">
          <div class="day-detail-row">
            <div class="day-detail-label">Type</div>
            <div class="day-detail-value">
              <span style="color:${getTypeColor(item.type)};font-weight:600">${item.type}</span>
            </div>
          </div>
          <div class="day-detail-row">
            <div class="day-detail-label">Title</div>
            <div class="day-detail-value" style="font-size:15px;font-weight:600;letter-spacing:-0.2px">${item.title}</div>
          </div>
          ${item.approved !== null ? `
          <div style="margin-top:16px">
            <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);margin-bottom:10px">Platform Publishing</div>
            <div class="day-platforms">${platformsHtml}</div>
          </div>` : ''}
          ${approveSection}
        </div>
      </div>`;
  } else {
    detailHtml = `<div class="day-card"><div class="empty-state"><div class="empty-icon">📅</div><div class="empty-text">Select a day above to view details</div></div></div>`;
  }

  document.getElementById('mainContent').innerHTML = `
    <div class="day-nav">
      <div class="day-scroll">${dayPills}</div>
    </div>
    ${detailHtml}`;
}

// ============================
// INTERACTIONS
// ============================
function toggleApproval(date) {
  const item = data.find(i => i.date === date);
  if (!item || item.approved === null) return;
  item.approved = !item.approved;
  saveState(data);
  render();
}

function togglePlatform(date, platform) {
  const item = data.find(i => i.date === date);
  if (!item) return;
  item.platforms[platform] = !item.platforms[platform];
  saveState(data);
  render();
}

function showDayDetail(date) {
  selectedDay = date;
  setView('day');
  const tabs = document.querySelectorAll('.view-tab');
  tabs.forEach((t,i) => t.classList.toggle('active', i === 2));
}

function selectDay(date) {
  selectedDay = date;
  renderDayView();
}

function setView(view, btn) {
  currentView = view;
  if (btn) {
    document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
  }
  render();
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function changeMonth(dir) {
  const [y, m] = currentMonth.split('-').map(Number);
  let newM = m + dir;
  let newY = y;
  if (newM > 12) { newM = 1; newY++; }
  if (newM < 1) { newM = 12; newY--; }
  currentMonth = `${newY}-${String(newM).padStart(2,'0')}`;
  data = loadState();
  selectedDay = null;
  render();
}

function render() {
  // Update month label
  const [y, m] = currentMonth.split('-').map(Number);
  const label = new Date(y, m-1, 1).toLocaleDateString('en-GB', { month:'long', year:'numeric' });
  document.getElementById('monthLabel').textContent = label;

  renderStats();

  if (currentView === 'month') renderMonthView();
  else if (currentView === 'week') renderWeekView();
  else renderDayView();
}

// Init
render();
</script>
